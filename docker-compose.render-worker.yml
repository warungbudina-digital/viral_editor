services:
  viral_editor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: viral_editor
    restart: unless-stopped
    ports:
      - "127.0.0.1:${VIRAL_EDITOR_PORT:-9020}:9020"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${VIRAL_EDITOR_INPUT_DIR:-./data/input}:/data/input
      - ${VIRAL_EDITOR_OUTPUT_DIR:-./data/output}:/data/output
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9020/healthz', timeout=5)\" || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 2g
    cpus: 2.0

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: viral_editor_cloudflared
    restart: unless-stopped
    depends_on:
      viral_editor:
        condition: service_healthy
    command: >
      tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    profiles:
      - public
